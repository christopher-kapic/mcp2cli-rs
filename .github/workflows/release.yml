name: Release

on:
  push:
    branches: [master]
    paths: [Cargo.toml]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. 0.1.1)"
        required: true

permissions:
  contents: write

jobs:
  create-release:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.version.outputs.changed }}
      version: ${{ steps.version.outputs.current }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Check for version change
        id: version
        run: |
          current="$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')"
          previous="$(git show HEAD~1:Cargo.toml | grep '^version' | head -1 | sed 's/.*"\(.*\)".*/\1/')"
          echo "current=${current}" >> "$GITHUB_OUTPUT"
          if [ "$current" != "$previous" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create release
        if: steps.version.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version="v${{ steps.version.outputs.current }}"
          gh release create "$version" --generate-notes --title "$version"

  build:
    needs: create-release
    if: always() && (github.event_name == 'workflow_dispatch' || needs.create-release.outputs.changed == 'true')
    strategy:
      matrix:
        include:
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../mcp2cli-${{ matrix.target }}.tar.gz mcp2cli
          cd ../../..

      - name: Generate checksum
        run: shasum -a 256 mcp2cli-${{ matrix.target }}.tar.gz > mcp2cli-${{ matrix.target }}.tar.gz.sha256

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "v${{ inputs.version || needs.create-release.outputs.version }}" mcp2cli-${{ matrix.target }}.tar.gz mcp2cli-${{ matrix.target }}.tar.gz.sha256
